[build]
  # Tell Netlify that the frontend code is in the "frontend" directory
  base = "frontend"

  # The directory where Vite outputs the built files
  publish = "dist"

  # The command to build the project
  command = "npm install && npm run build"

[build.environment]
  # Pin the Node.js version for consistent builds
  NODE_VERSION = "18"

# ─── Security Headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), camera=(self)"

# ─── Cache static JS/CSS assets aggressively (Vite hashes the filenames) ───────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── SPA Fallback — React Router must handle all routes ────────────────────────
# IMPORTANT: This must be the LAST rule in this file
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
